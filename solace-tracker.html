<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advocate Log — Solace Health</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
  :root {
    --bg:#F7F8FA;--surface:#FFFFFF;--surface2:#F0F2F5;--border:#E2E5EA;
    --accent:#2C6E8A;--accent-light:#E8F4F8;--accent2:#3DAA74;--accent2-light:#E8F7F0;
    --warn:#C9622F;--warn-light:#FDF0EA;--text:#1A1D23;--text2:#5A6172;--text3:#9BA3B0;
    --mono:'IBM Plex Mono',monospace;--sans:'Inter',sans-serif;--radius:10px;--shadow:0 1px 4px rgba(0,0,0,0.07);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
  .app{display:flex;height:100vh;overflow:hidden;}
  .sidebar{width:260px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .main{flex:1;overflow-y:auto;padding:28px 32px;}
  .sidebar-header{padding:20px 18px 14px;border-bottom:1px solid var(--border);}
  .sidebar-header .logo{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:4px;}
  .sidebar-header h1{font-size:15px;font-weight:600;}
  .sync-status{font-size:10px;margin-top:4px;display:flex;align-items:center;gap:4px;}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);}
  .sync-dot.synced{background:var(--accent2);}
  .sync-dot.syncing{background:#E8A838;animation:pulse 1s infinite;}
  .sync-dot.error{background:var(--warn);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  .sidebar-nav{padding:12px 10px;border-bottom:1px solid var(--border);}
  .nav-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;border:none;background:none;border-radius:7px;cursor:pointer;font-size:13px;font-family:var(--sans);color:var(--text2);font-weight:500;transition:all .15s;text-align:left;}
  .nav-btn:hover{background:var(--surface2);color:var(--text);}
  .nav-btn.active{background:var(--accent-light);color:var(--accent);}
  .sidebar-patients{flex:1;overflow-y:auto;padding:10px;}
  .sidebar-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:4px 8px 8px;}
  .patient-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:7px;cursor:pointer;transition:all .15s;margin-bottom:2px;}
  .patient-item:hover{background:var(--surface2);}
  .patient-item.active{background:var(--accent-light);}
  .patient-avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .patient-info{flex:1;min-width:0;}
  .patient-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .patient-meta{font-size:11px;color:var(--text3);margin-top:1px;}
  .pending-dot{width:7px;height:7px;border-radius:50%;background:var(--warn);flex-shrink:0;}
  .add-patient-btn{margin:8px 10px;display:flex;align-items:center;gap:8px;padding:8px 10px;border:1.5px dashed var(--border);border-radius:7px;background:none;cursor:pointer;font-size:12px;font-family:var(--sans);color:var(--text3);font-weight:500;transition:all .15s;width:calc(100% - 20px);}
  .add-patient-btn:hover{border-color:var(--accent);color:var(--accent);}
  .page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;}
  .page-title{font-size:22px;font-weight:600;}
  .page-subtitle{font-size:13px;color:var(--text2);margin-top:3px;}
  .btn{padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-family:var(--sans);font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{background:#235a73;}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
  .btn-secondary:hover{background:var(--border);}
  .btn-success{background:var(--accent2);color:#fff;}
  .btn-success:hover{background:#2d8a5e;}
  .btn-danger{background:var(--warn-light);color:var(--warn);border:1px solid #f0c0a0;}
  .btn-danger:hover{background:#fce0d0;}
  .btn-sm{padding:5px 10px;font-size:12px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px;}
  .card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
  .stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:6px;}
  .stat-value{font-size:26px;font-weight:600;color:var(--text);font-family:var(--mono);line-height:1;}
  .stat-sub{font-size:11px;color:var(--text3);margin-top:4px;}
  .checklist{list-style:none;}
  .checklist li{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);}
  .checklist li:last-child{border-bottom:none;}
  .checklist li input[type=checkbox]{margin-top:2px;accent-color:var(--accent);width:15px;height:15px;flex-shrink:0;cursor:pointer;}
  .checklist li.done label{text-decoration:line-through;color:var(--text3);}
  .checklist li label{cursor:pointer;line-height:1.4;}
  .log-entry{background:var(--surface2);border-radius:8px;padding:13px 15px;margin-bottom:10px;border-left:3px solid var(--border);position:relative;}
  .log-entry.call{border-left-color:var(--accent);}
  .log-entry.visit{border-left-color:var(--accent2);}
  .log-entry.task{border-left-color:#9B6BBF;}
  .log-entry.transcript{border-left-color:var(--warn);}
  .log-entry.message{border-left-color:#E8A838;}
  .log-entry-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .log-type-badge{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:2px 7px;border-radius:4px;background:var(--border);color:var(--text2);}
  .log-type-badge.call{background:var(--accent-light);color:var(--accent);}
  .log-type-badge.visit{background:var(--accent2-light);color:var(--accent2);}
  .log-type-badge.task{background:#F3EDF8;color:#9B6BBF;}
  .log-type-badge.transcript{background:var(--warn-light);color:var(--warn);}
  .log-type-badge.message{background:#FEF6E4;color:#C98A20;}
  .log-timestamp{font-size:11px;color:var(--text3);font-family:var(--mono);}
  .log-summary{font-size:13px;color:var(--text);margin-bottom:4px;font-weight:500;}
  .log-detail{font-size:12px;color:var(--text2);line-height:1.5;}
  .log-actions{display:flex;gap:6px;margin-top:8px;}
  .transcript-box{background:#F9F0FF;border:1px solid #DDD0EE;border-radius:7px;padding:12px;font-size:12px;color:var(--text2);line-height:1.6;max-height:160px;overflow-y:auto;font-family:var(--mono);white-space:pre-wrap;margin-top:8px;}
  .form-group{margin-bottom:14px;}
  .form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;}
  .form-input,.form-select,.form-textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:var(--sans);color:var(--text);background:var(--surface);transition:border-color .15s;outline:none;}
  .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
  .form-textarea{resize:vertical;min-height:80px;line-height:1.5;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;z-index:1000;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border-radius:12px;width:540px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.18);}
  .modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .modal-title{font-size:16px;font-weight:600;}
  .modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--text3);line-height:1;}
  .modal-body{padding:20px 24px;}
  .modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
  .tabs{display:flex;gap:2px;background:var(--surface2);padding:3px;border-radius:8px;margin-bottom:20px;width:fit-content;}
  .tab-btn{padding:7px 16px;border:none;background:none;border-radius:6px;cursor:pointer;font-size:13px;font-family:var(--sans);font-weight:500;color:var(--text2);transition:all .15s;}
  .tab-btn.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow);}
  .alert{padding:10px 14px;border-radius:7px;font-size:12px;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px;}
  .alert-warn{background:var(--warn-light);color:var(--warn);border:1px solid #f0c0a0;}
  .alert-info{background:var(--accent-light);color:var(--accent);border:1px solid #c0dcea;}
  .alert-success{background:var(--accent2-light);color:var(--accent2);border:1px solid #b0e0c8;}
  .ai-loading{display:flex;align-items:center;gap:10px;padding:12px;background:var(--accent-light);border-radius:8px;font-size:13px;color:var(--accent);margin-bottom:14px;}
  .spinner{width:16px;height:16px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .hidden{display:none!important;}
  .empty-state{text-align:center;padding:40px 20px;color:var(--text3);}
  .empty-state .icon{font-size:36px;margin-bottom:12px;}
  .empty-state p{font-size:13px;}
  .action-items{list-style:none;}
  .action-items li{display:flex;align-items:flex-start;gap:8px;padding:5px 0;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border);}
  .action-items li:last-child{border:none;}
  .action-items li::before{content:'→';color:var(--accent);flex-shrink:0;font-weight:600;}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .week-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:10px;}
  .day-cell{background:var(--surface2);border-radius:6px;padding:8px;text-align:center;font-size:11px;}
  .day-cell .day-name{color:var(--text3);margin-bottom:4px;font-weight:600;}
  .day-cell .day-count{font-size:18px;font-weight:600;font-family:var(--mono);color:var(--text);}
  .day-cell.today{background:var(--accent-light);border:1px solid #b0d8ea;}
  .next-visit-banner{background:linear-gradient(135deg,#FEF6E4 0%,#FDF0EA 100%);border:1.5px solid #F0C87A;border-radius:9px;padding:13px 16px;margin-bottom:14px;}
  .next-visit-banner .nvb-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#C98A20;margin-bottom:5px;display:flex;align-items:center;gap:5px;}
  .next-visit-banner .nvb-text{font-size:13px;color:#7A5010;line-height:1.5;white-space:pre-wrap;}
  .next-visit-banner .nvb-from{font-size:11px;color:#C98A20;margin-top:5px;font-family:var(--mono);}
  /* Loading overlay */
  #loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:14px;}
  #loading-screen .logo-big{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);}
  #loading-screen h2{font-size:18px;font-weight:600;color:var(--text);}
  #loading-screen p{font-size:13px;color:var(--text2);}
  #loading-screen .spinner{width:28px;height:28px;border-width:3px;}
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--text3);}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading-screen">
  <div class="logo-big">Solace Health</div>
  <div class="spinner" style="border-color:var(--accent);border-top-color:transparent;"></div>
  <h2>Advocate Log</h2>
  <p>Connecting to your data...</p>
</div>

<div class="app" style="display:none" id="app-shell">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">Solace Health</div>
      <h1>Advocate Log</h1>
      <div class="sync-status">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-label" style="color:var(--text3);font-size:10px;">Connecting...</span>
      </div>
    </div>
    <div class="sidebar-nav">
      <button class="nav-btn active" onclick="showView('dashboard')" id="nav-dashboard"><span>📊</span> Dashboard</button>
      <button class="nav-btn" onclick="showView('compliance')" id="nav-compliance"><span>✅</span> Compliance Checklist</button>
    </div>
    <div class="sidebar-patients">
      <div class="sidebar-label">Patients</div>
      <div id="patient-list"></div>
    </div>
    <button class="add-patient-btn" onclick="openAddPatient()">＋ Add Patient</button>
  </div>
  <div class="main" id="main-content"></div>
</div>

<!-- Add Patient Modal -->
<div class="modal-overlay" id="modal-patient">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add New Patient</div>
      <button class="modal-close" onclick="closeModal('modal-patient')">×</button>
    </div>
    <div class="modal-body">
      <div class="grid-2">
        <div class="form-group"><label class="form-label">First Name / Initials *</label><input class="form-input" id="p-firstname" placeholder="e.g. J or Jane"></div>
        <div class="form-group"><label class="form-label">Last Name / Initial *</label><input class="form-input" id="p-lastname" placeholder="e.g. D or Doe"></div>
      </div>
      <div class="form-group"><label class="form-label">Insurance / Plan</label><input class="form-input" id="p-insurance" placeholder="e.g. BlueCross PPO"></div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="p-notes" placeholder="Key contacts, special considerations..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-patient')">Cancel</button>
      <button class="btn btn-primary" onclick="savePatient()">Add Patient</button>
    </div>
  </div>
</div>

<!-- Log Entry Modal -->
<div class="modal-overlay" id="modal-log">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-log-title">Log Entry</div>
      <button class="modal-close" onclick="closeModal('modal-log')">×</button>
    </div>
    <div class="modal-body" id="modal-log-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-log')">Cancel</button>
      <button class="btn btn-primary" id="modal-log-save">Save Entry</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getFirestore, collection, doc, onSnapshot, setDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBhBQUr026VGduuQmy6UQEj1w2EmpGHFfY",
  authDomain: "advocatelog1.firebaseapp.com",
  projectId: "advocatelog1",
  storageBucket: "advocatelog1.firebasestorage.app",
  messagingSenderId: "811154363693",
  appId: "1:811154363693:web:3d17d3e95647ca3233afa4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===================== SYNC STATUS =====================
function setSyncStatus(status) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  dot.className = 'sync-dot ' + status;
  label.textContent = status === 'synced' ? 'Synced' : status === 'syncing' ? 'Saving...' : status === 'error' ? 'Offline' : 'Connecting...';
}

// ===================== STATE =====================
let state = { patients: [], logs: [], currentView: 'dashboard', currentPatientId: null, currentTab: 'all' };

// ===================== FIRESTORE LISTENERS =====================
onSnapshot(collection(db, 'patients'), snap => {
  state.patients = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderSidebar();
  if (state.currentView === 'dashboard') renderDashboard();
  else if (state.currentView === 'patient') renderPatient(state.currentPatientId);
  setSyncStatus('synced');
}, () => setSyncStatus('error'));

onSnapshot(query(collection(db, 'logs'), orderBy('date', 'desc')), snap => {
  state.logs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderSidebar();
  if (state.currentView === 'dashboard') renderDashboard();
  else if (state.currentView === 'patient') renderPatient(state.currentPatientId);
  // Hide loading once data arrives
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('app-shell').style.display = 'flex';
  setSyncStatus('synced');
}, () => {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('app-shell').style.display = 'flex';
  setSyncStatus('error');
});

// ===================== FIREBASE WRITE HELPERS =====================
async function fbSavePatient(p) {
  setSyncStatus('syncing');
  await setDoc(doc(db, 'patients', p.id), p);
  setSyncStatus('synced');
}
async function fbDeletePatient(id) {
  setSyncStatus('syncing');
  await deleteDoc(doc(db, 'patients', id));
  setSyncStatus('synced');
}
async function fbSaveLog(l) {
  setSyncStatus('syncing');
  await setDoc(doc(db, 'logs', l.id), l);
  setSyncStatus('synced');
}
async function fbDeleteLog(id) {
  setSyncStatus('syncing');
  await deleteDoc(doc(db, 'logs', id));
  setSyncStatus('synced');
}

// ===================== HELPERS =====================
function initials(name) { return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function formatDate(iso) { if(!iso)return''; return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function formatTime(iso) { if(!iso)return''; return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }
function formatDateTime(iso) { return `${formatDate(iso)} · ${formatTime(iso)}`; }
function now() { return new Date().toISOString(); }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function patientName(pid) { const p=state.patients.find(p=>p.id===pid); return p?`${p.firstName} ${p.lastName}`:''; }
function getPatientLogs(pid) { return state.logs.filter(l=>l.patientId===pid).sort((a,b)=>new Date(b.date)-new Date(a.date)); }
function getPendingDocs(pid) { return state.logs.filter(l=>l.patientId===pid&&l.type==='visit'&&!l.docSubmitted).length; }
function getThisWeekCount(pid) { const w=new Date();w.setDate(w.getDate()-7); return state.logs.filter(l=>l.patientId===pid&&l.type==='visit'&&new Date(l.date)>w).length; }
function avatarColor(id) {
  const c=['#2C6E8A','#3DAA74','#9B6BBF','#C9622F','#4A90B8','#2E8B57','#7B5EA7','#D4752A'];
  let h=0; for(let ch of id) h=(h*31+ch.charCodeAt(0))&0xffff; return c[h%c.length];
}
function getLastForNextVisit(pid) {
  return state.logs.filter(l=>l.patientId===pid&&l.type==='visit'&&l.forNextVisit).sort((a,b)=>new Date(b.date)-new Date(a.date))[0]||null;
}

// ===================== VIEWS =====================
window.showView = function(view, patientId) {
  state.currentView = view;
  if(patientId) state.currentPatientId = patientId;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.patient-item').forEach(b=>b.classList.remove('active'));
  if(view==='dashboard'){document.getElementById('nav-dashboard')?.classList.add('active');renderDashboard();}
  else if(view==='compliance'){document.getElementById('nav-compliance')?.classList.add('active');renderCompliance();}
  else if(view==='patient'){document.querySelector(`.patient-item[data-id="${patientId}"]`)?.classList.add('active');renderPatient(patientId);}
  renderSidebar();
}

// ===================== SIDEBAR =====================
function renderSidebar() {
  const list = document.getElementById('patient-list');
  if(!list) return;
  if(!state.patients.length){list.innerHTML=`<div style="padding:8px 10px;font-size:12px;color:var(--text3)">No patients yet</div>`;return;}
  list.innerHTML = state.patients.map(p=>{
    const pending=getPendingDocs(p.id),weekVisits=getThisWeekCount(p.id);
    const active=state.currentView==='patient'&&state.currentPatientId===p.id;
    return `<div class="patient-item ${active?'active':''}" data-id="${p.id}" onclick="showView('patient','${p.id}')">
      <div class="patient-avatar" style="background:${avatarColor(p.id)}">${initials(p.firstName+' '+p.lastName)}</div>
      <div class="patient-info">
        <div class="patient-name">${p.firstName} ${p.lastName}</div>
        <div class="patient-meta">${weekVisits} visit${weekVisits!==1?'s':''} this week</div>
      </div>
      ${pending?`<div class="pending-dot" title="${pending} undocumented"></div>`:''}
    </div>`;
  }).join('');
}

// ===================== DASHBOARD =====================
function renderDashboard() {
  const main=document.getElementById('main-content'); if(!main)return;
  const weekAgo=new Date();weekAgo.setDate(weekAgo.getDate()-7);
  const weekVisits=state.logs.filter(l=>l.type==='visit'&&new Date(l.date)>weekAgo).length;
  const weekCalls=state.logs.filter(l=>l.type==='call'&&new Date(l.date)>weekAgo).length;
  const pendingDocs=state.patients.reduce((s,p)=>s+getPendingDocs(p.id),0);
  const recentLogs=[...state.logs].slice(0,8);
  const days=['Mon','Tue','Wed','Thu','Fri'],dayCounts=[0,0,0,0,0];
  state.logs.filter(l=>l.type==='visit'&&new Date(l.date)>weekAgo).forEach(l=>{const d=new Date(l.date).getDay();if(d>=1&&d<=5)dayCounts[d-1]++;});
  const todayDow=new Date().getDay();
  main.innerHTML=`
    <div class="page-header">
      <div><div class="page-title">Dashboard</div><div class="page-subtitle">Your activity at a glance</div></div>
      <button class="btn btn-primary" onclick="openLogModal()">＋ Log Entry</button>
    </div>
    ${pendingDocs>0?`<div class="alert alert-warn">⚠️ <span><strong>${pendingDocs} visit${pendingDocs!==1?'s':''}</strong> missing documentation in Solace.</span></div>`:''}
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Patients</div><div class="stat-value">${state.patients.length}</div><div class="stat-sub">Active caseload</div></div>
      <div class="stat-card"><div class="stat-label">Visits This Week</div><div class="stat-value">${weekVisits}</div><div class="stat-sub">Phone/video sessions</div></div>
      <div class="stat-card"><div class="stat-label">Calls This Week</div><div class="stat-value">${weekCalls}</div><div class="stat-sub">Orgs, insurers, providers</div></div>
      <div class="stat-card"><div class="stat-label">Pending Docs</div><div class="stat-value" style="color:${pendingDocs>0?'var(--warn)':'var(--accent2)'}">${pendingDocs}</div><div class="stat-sub">Unsubmitted visit notes</div></div>
    </div>
    <div class="grid-2">
      <div class="card">
        <div class="card-title">📅 Visits by Day (This Week)</div>
        <div class="week-grid">${days.map((d,i)=>`<div class="day-cell ${(i+1)===todayDow?'today':''}"><div class="day-name">${d}</div><div class="day-count">${dayCounts[i]}</div></div>`).join('')}</div>
      </div>
      <div class="card">
        <div class="card-title">⚡ Quick Log</div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <button class="btn btn-secondary" style="justify-content:flex-start" onclick="openLogModal('visit')">📞 Log Telephone Visit</button>
          <button class="btn btn-secondary" style="justify-content:flex-start" onclick="openLogModal('call')">📋 Log Outreach Call</button>
          <button class="btn btn-secondary" style="justify-content:flex-start" onclick="openLogModal('task')">✓ Log Completed Task</button>
          <button class="btn btn-secondary" style="justify-content:flex-start" onclick="openLogModal('transcript')">🎙️ Upload Transcript</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">🕐 Recent Activity</div>
      ${recentLogs.length===0?`<div class="empty-state"><div class="icon">📝</div><p>No entries yet.</p></div>`:recentLogs.map(l=>renderLogEntry(l,true)).join('')}
    </div>`;
}

// ===================== PATIENT VIEW =====================
function renderPatient(pid) {
  const p=state.patients.find(p=>p.id===pid); if(!p)return;
  const main=document.getElementById('main-content'); if(!main)return;
  const logs=getPatientLogs(pid),pending=getPendingDocs(pid),weekVisits=getThisWeekCount(pid);
  const tab=state.currentTab||'all';
  const filteredLogs=tab==='all'?logs:logs.filter(l=>l.type===tab);
  main.innerHTML=`
    <div class="page-header">
      <div style="display:flex;align-items:center;gap:14px">
        <div class="patient-avatar" style="width:44px;height:44px;font-size:16px;background:${avatarColor(pid)}">${initials(p.firstName+' '+p.lastName)}</div>
        <div><div class="page-title">${p.firstName} ${p.lastName}</div><div class="page-subtitle">${p.insurance||'No insurance on file'} · ${weekVisits} visit${weekVisits!==1?'s':''} this week</div></div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary btn-sm" onclick="openLogModal(null,'${pid}')">＋ Log Entry</button>
        <button class="btn btn-danger btn-sm" onclick="deletePatient('${pid}')">Remove</button>
      </div>
    </div>
    ${pending>0?`<div class="alert alert-warn">⚠️ <strong>${pending} visit${pending!==1?'s':''}</strong> need documentation in Solace.</div>`:''}
    ${p.notes?`<div class="alert alert-info">📋 ${p.notes}</div>`:''}
    <div class="tabs">
      <button class="tab-btn ${tab==='all'?'active':''}" onclick="setTab('all')">All</button>
      <button class="tab-btn ${tab==='visit'?'active':''}" onclick="setTab('visit')">Visits</button>
      <button class="tab-btn ${tab==='call'?'active':''}" onclick="setTab('call')">Calls</button>
      <button class="tab-btn ${tab==='task'?'active':''}" onclick="setTab('task')">Tasks</button>
      <button class="tab-btn ${tab==='transcript'?'active':''}" onclick="setTab('transcript')">Transcripts</button>
      <button class="tab-btn ${tab==='message'?'active':''}" onclick="setTab('message')">Messages</button>
    </div>
    ${filteredLogs.length===0?`<div class="empty-state"><div class="icon">📂</div><p>No ${tab==='all'?'':tab+' '}entries yet.</p></div>`:filteredLogs.map(l=>renderLogEntry(l,false)).join('')}`;
}

window.setTab = function(tab){state.currentTab=tab;renderPatient(state.currentPatientId);}

// ===================== LOG ENTRY RENDERER =====================
function renderLogEntry(l, showPatient) {
  const typeLabels={visit:'Visit',call:'Outreach Call',task:'Task',transcript:'Transcript',message:'Message'};
  const pName=showPatient?`<span style="font-size:11px;color:var(--text2);margin-right:8px">👤 ${patientName(l.patientId)}</span>`:'';
  let extra='';
  if(l.org) extra+=`<span style="font-size:12px;color:var(--text2)">🏢 ${l.org}</span> `;
  if(l.duration) extra+=`<span style="font-size:12px;color:var(--text2)">⏱ ${l.duration} min</span>`;
  if(l.outcome) extra+=`<div style="font-size:12px;color:var(--text2);margin-top:4px">📌 ${l.outcome}</div>`;
  if(l.docSubmitted) extra+=`<div><span style="font-size:11px;color:var(--accent2);font-weight:600">✓ Documented in Solace</span></div>`;
  if(l.type==='visit'&&!l.docSubmitted) extra+=`<button class="btn btn-success btn-sm" style="margin-top:6px" onclick="markDocSubmitted('${l.id}')">✓ Mark as Documented</button>`;
  if(l.transcript) extra+=`<details style="margin-top:8px"><summary style="font-size:12px;color:var(--accent);cursor:pointer;font-weight:500">View Transcript</summary><div class="transcript-box">${l.transcript}</div></details>`;
  if(l.actionItems&&l.actionItems.length) extra+=`<div style="margin-top:8px;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px">Action Items:</div><ul class="action-items">${l.actionItems.map(a=>`<li>${a}</li>`).join('')}</ul>`;
  if(l.forNextVisit) extra+=`<div style="margin-top:10px;background:#FEF6E4;border:1.5px solid #F0C87A;border-radius:7px;padding:10px 12px"><div style="font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#C98A20;margin-bottom:4px">📌 For Next Visit</div><div style="font-size:12px;color:#7A5010;white-space:pre-wrap;line-height:1.5">${l.forNextVisit}</div></div>`;
  return `<div class="log-entry ${l.type}" id="log-${l.id}">
    <div class="log-entry-header">
      <div style="display:flex;align-items:center;gap:8px">${pName}<span class="log-type-badge ${l.type}">${typeLabels[l.type]||l.type}</span></div>
      <span class="log-timestamp">${formatDateTime(l.date)}</span>
    </div>
    <div class="log-summary">${l.summary}</div>
    ${l.detail?`<div class="log-detail">${l.detail}</div>`:''}
    ${extra}
    <div class="log-actions"><button class="btn btn-secondary btn-sm" onclick="deleteLog('${l.id}')">Delete</button></div>
  </div>`;
}

// ===================== MARK DOCUMENTED =====================
window.markDocSubmitted = async function(logId) {
  const log=state.logs.find(l=>l.id===logId); if(!log)return;
  log.docSubmitted=true;
  await fbSaveLog(log);
}

// ===================== LOG MODAL =====================
let currentLogType=null,currentLogPatient=null,aiExtracted={};

window.openLogModal = function(type, pid) {
  currentLogType=type||null;
  currentLogPatient=pid||state.currentPatientId||(state.patients[0]?state.patients[0].id:null);
  if(!currentLogPatient){alert('Please add a patient first.');return;}
  document.getElementById('modal-log-title').textContent=type?`Log ${{visit:'Telephone Visit',call:'Outreach Call',task:'Task',transcript:'Transcript',message:'Message'}[type]||'Entry'}`:'Log Entry';
  const body=document.getElementById('modal-log-body');
  const patientSelect=state.patients.map(p=>`<option value="${p.id}" ${p.id===currentLogPatient?'selected':''}>${p.firstName} ${p.lastName}</option>`).join('');
  let typeSpecific='';
  if(!type||type==='visit') typeSpecific=visitHTML();
  else if(type==='call') typeSpecific=callHTML();
  else if(type==='task') typeSpecific=`<div class="form-group"><label class="form-label">Task Details</label><textarea class="form-textarea" id="log-detail" placeholder="Describe the task completed..."></textarea></div>`;
  else if(type==='transcript') typeSpecific=transcriptHTML();
  else if(type==='message') typeSpecific=`<div class="form-group"><label class="form-label">Message Summary *</label><textarea class="form-textarea" id="log-detail" placeholder="Summarize the message exchange..."></textarea></div>`;
  body.innerHTML=`
    ${!type?`<div class="form-group"><label class="form-label">Entry Type *</label><select class="form-select" id="log-type" onchange="changeLogType(this.value)"><option value="visit">Telephone Visit</option><option value="call">Outreach Call</option><option value="task">Completed Task</option><option value="transcript">Transcript</option><option value="message">Message</option></select></div>`:''}
    <div class="form-group"><label class="form-label">Patient *</label><select class="form-select" id="log-patient">${patientSelect}</select></div>
    <div class="form-group"><label class="form-label">Date & Time</label><input class="form-input" id="log-date" type="datetime-local" value="${new Date().toISOString().slice(0,16)}"></div>
    <div class="form-group"><label class="form-label">Summary *</label><input class="form-input" id="log-summary" placeholder="Brief description..."></div>
    <div id="type-specific">${typeSpecific}</div>`;
  if(!type) document.getElementById('type-specific').innerHTML=visitHTML();
  document.getElementById('modal-log-save').onclick=saveLog;
  openModal('modal-log');
  // Show "for next visit" banner if it's a visit
  if(type==='visit'||!type) {
    const lastVisit=getLastForNextVisit(currentLogPatient);
    if(lastVisit){
      const banner=document.createElement('div');
      banner.className='next-visit-banner';
      banner.innerHTML=`<div class="nvb-label">📌 Carried over from last visit</div><div class="nvb-text">${lastVisit.forNextVisit}</div><div class="nvb-from">from visit on ${formatDate(lastVisit.date)}</div>`;
      body.insertBefore(banner,body.firstChild);
    }
  }
}

function visitHTML(){return`<div class="form-group"><label class="form-label">Duration (minutes)</label><input class="form-input" id="log-duration" type="number" placeholder="30"></div><div class="form-group"><label class="form-label">Session Notes</label><textarea class="form-textarea" id="log-detail" placeholder="What was discussed..."></textarea></div><div class="form-group"><label class="form-label">📌 For Next Visit</label><textarea class="form-textarea" id="log-fornext" style="min-height:60px;border-color:#F0C87A;background:#FEFAF0" placeholder="Reminders, follow-ups, or questions for the next call..."></textarea><div style="font-size:11px;color:var(--text3);margin-top:4px">Automatically shown at the top of your next visit note.</div></div><div class="alert alert-info" style="font-size:11px">💡 Submit notes in Solace immediately after saving.</div>`;}
function callHTML(){return`<div class="form-group"><label class="form-label">Organization Called</label><input class="form-input" id="log-org" placeholder="BlueCross, DME supplier..."></div><div class="form-group"><label class="form-label">Duration (minutes)</label><input class="form-input" id="log-duration" type="number" placeholder="15"></div><div class="form-group"><label class="form-label">Outcome</label><input class="form-input" id="log-outcome" placeholder="Approved, Pending, Voicemail..."></div><div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="log-detail" placeholder="Details..."></textarea></div>`;}
function transcriptHTML(){return`<div class="form-group"><label class="form-label">Paste Transcript from Plaud *</label><textarea class="form-textarea" id="log-transcript" style="min-height:140px;font-family:var(--mono);font-size:12px" placeholder="Paste your Plaud transcript here..."></textarea></div><div id="ai-result" class="hidden"></div><button class="btn btn-primary" type="button" onclick="runAIExtract()">🤖 Extract with AI</button><div style="font-size:11px;color:var(--text3);margin-top:6px">AI will auto-fill summary, org, outcome, duration, and action items.</div>`;}

window.changeLogType = function(type){document.getElementById('type-specific').innerHTML={visit:visitHTML(),call:callHTML(),task:`<div class="form-group"><label class="form-label">Task Details</label><textarea class="form-textarea" id="log-detail" placeholder="Describe the task..."></textarea></div>`,transcript:transcriptHTML(),message:`<div class="form-group"><label class="form-label">Message Summary</label><textarea class="form-textarea" id="log-detail" placeholder="Summarize the exchange..."></textarea></div>`}[type]||'';currentLogType=type;}

// ===================== AI EXTRACT =====================
window.runAIExtract = async function() {
  const transcript=document.getElementById('log-transcript')?.value?.trim();
  if(!transcript){alert('Please paste a transcript first.');return;}
  const resultDiv=document.getElementById('ai-result');
  resultDiv.className='';
  resultDiv.innerHTML=`<div class="ai-loading"><div class="spinner"></div> AI is reading the transcript...</div>`;
  const patientId=document.getElementById('log-patient')?.value;
  const patient=state.patients.find(p=>p.id===patientId);
  const patientContext=patient?`The patient's name is ${patient.firstName} ${patient.lastName}.`:'';
  const prompt=`You are an assistant helping a healthcare advocate log calls and visits. ${patientContext}\nAnalyze this transcript and extract:\n1. A brief summary (1-2 sentences)\n2. Organization or person called (or "Patient visit")\n3. Outcome/result\n4. Estimated duration in minutes\n5. 2-4 specific action items\n\nRespond ONLY with valid JSON, no markdown:\n{"summary":"...","org":"...","outcome":"...","duration":15,"actionItems":["...","..."]}\n\nTRANSCRIPT:\n${transcript.slice(0,3000)}`;
  try {
    const response=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
    const data=await response.json();
    const text=data.content?.map(c=>c.text||'').join('')||'';
    aiExtracted=JSON.parse(text.replace(/```json|```/g,'').trim());
    const summaryEl=document.getElementById('log-summary');
    if(summaryEl&&aiExtracted.summary) summaryEl.value=aiExtracted.summary;
    resultDiv.innerHTML=`<div class="alert alert-success" style="flex-direction:column;align-items:flex-start;gap:6px"><strong>✓ AI extracted:</strong><div><strong>Summary:</strong> ${aiExtracted.summary}</div>${aiExtracted.org?`<div><strong>Org:</strong> ${aiExtracted.org}</div>`:''} ${aiExtracted.outcome?`<div><strong>Outcome:</strong> ${aiExtracted.outcome}</div>`:''} ${aiExtracted.duration?`<div><strong>Duration:</strong> ${aiExtracted.duration} min</div>`:''} ${aiExtracted.actionItems?.length?`<div><strong>Action Items:</strong>${aiExtracted.actionItems.map(a=>`<br>→ ${a}`).join('')}</div>`:''}</div>`;
  } catch(e) {
    resultDiv.innerHTML=`<div class="alert alert-warn">⚠️ AI extraction failed. Save manually. (${e.message})</div>`;
    aiExtracted={};
  }
}

// ===================== SAVE LOG =====================
async function saveLog() {
  const patientId=document.getElementById('log-patient')?.value;
  const summary=document.getElementById('log-summary')?.value?.trim();
  const date=document.getElementById('log-date')?.value||now();
  const type=currentLogType||document.getElementById('log-type')?.value||'visit';
  if(!patientId||!summary){alert('Please fill in patient and summary.');return;}
  const log={
    id:uid(),patientId,type,date:new Date(date).toISOString(),summary,
    detail:document.getElementById('log-detail')?.value?.trim()||'',
    duration:document.getElementById('log-duration')?.value||aiExtracted.duration||'',
    org:document.getElementById('log-org')?.value?.trim()||aiExtracted.org||'',
    outcome:document.getElementById('log-outcome')?.value?.trim()||aiExtracted.outcome||'',
    transcript:document.getElementById('log-transcript')?.value?.trim()||'',
    actionItems:aiExtracted.actionItems||[],
    forNextVisit:document.getElementById('log-fornext')?.value?.trim()||'',
    docSubmitted:false
  };
  aiExtracted={};
  closeModal('modal-log');
  await fbSaveLog(log);
}

// ===================== PATIENT CRUD =====================
window.openAddPatient = function(){openModal('modal-patient');}

window.savePatient = async function() {
  const firstName=document.getElementById('p-firstname')?.value?.trim();
  const lastName=document.getElementById('p-lastname')?.value?.trim();
  if(!firstName||!lastName){alert('Please enter a name or initials.');return;}
  const p={id:uid(),firstName,lastName,insurance:document.getElementById('p-insurance')?.value?.trim()||'',notes:document.getElementById('p-notes')?.value?.trim()||''};
  ['p-firstname','p-lastname','p-insurance','p-notes'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  closeModal('modal-patient');
  await fbSavePatient(p);
}

window.deletePatient = async function(pid) {
  if(!confirm('Remove this patient and all their logs?'))return;
  const logIds=state.logs.filter(l=>l.patientId===pid).map(l=>l.id);
  await fbDeletePatient(pid);
  await Promise.all(logIds.map(id=>fbDeleteLog(id)));
  showView('dashboard');
}

window.deleteLog = async function(lid) {
  if(!confirm('Delete this entry?'))return;
  await fbDeleteLog(lid);
}

// ===================== COMPLIANCE CHECKLIST =====================
const COMPLIANCE_ITEMS=[
  {id:'c1',category:'Documentation',text:'Submitted session notes in Solace immediately after every visit today'},
  {id:'c2',category:'Documentation',text:'All required fields in Solace platform are fully completed (no blanks)'},
  {id:'c3',category:'Documentation',text:'Visit type/service code is correct for every session logged'},
  {id:'c4',category:'Documentation',text:'All between-visit activity (calls, records, follow-ups) is logged'},
  {id:'c5',category:'Scheduling',text:'No new patient visits rescheduled without following exact Solace policy'},
  {id:'c6',category:'Scheduling',text:'Any rescheduling decisions are documented with full reasoning'},
  {id:'c7',category:'Time Logging',text:'Time logged reflects actual work — no rounded or padded entries'},
  {id:'c8',category:'Time Logging',text:'Each logged time block has specific notes describing what was done'},
  {id:'c9',category:'Time Logging',text:'Time entries vary naturally (not identical durations every session)'},
  {id:'c10',category:'Communication',text:'All Solace support communications saved/screenshotted for your records'},
  {id:'c11',category:'Communication',text:'Patient messages responded to in a timely manner'},
  {id:'c12',category:'Records',text:'Personal backup records match what is submitted in Solace'},
];
let checkedItems={};
try{checkedItems=JSON.parse(localStorage.getItem('solace-checklist')||'{}');}catch(e){}
function saveChecklist(){localStorage.setItem('solace-checklist',JSON.stringify(checkedItems));}

function renderCompliance(){
  const main=document.getElementById('main-content');if(!main)return;
  const cats=[...new Set(COMPLIANCE_ITEMS.map(i=>i.category))];
  const total=COMPLIANCE_ITEMS.length,done=COMPLIANCE_ITEMS.filter(i=>checkedItems[i.id]).length,pct=Math.round(done/total*100);
  main.innerHTML=`
    <div class="page-header">
      <div><div class="page-title">Compliance Checklist</div><div class="page-subtitle">Daily habits to stay in good standing with Solace</div></div>
      <button class="btn btn-secondary" onclick="resetChecklist()">Reset All</button>
    </div>
    <div class="card" style="margin-bottom:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="card-title" style="margin:0">Today's Progress</div>
        <span style="font-family:var(--mono);font-weight:600;color:${pct===100?'var(--accent2)':'var(--accent)'}">${done}/${total}</span>
      </div>
      <div style="background:var(--surface2);border-radius:6px;height:8px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${pct===100?'var(--accent2)':'var(--accent)'};border-radius:6px;transition:width .3s"></div></div>
      ${pct===100?'<div class="alert alert-success" style="margin-top:12px;margin-bottom:0">✅ All items checked — you\'re in good standing today.</div>':''}
    </div>
    ${cats.map(cat=>`<div class="card"><div class="card-title">📁 ${cat}</div><ul class="checklist">${COMPLIANCE_ITEMS.filter(i=>i.category===cat).map(item=>`<li class="${checkedItems[item.id]?'done':''}"><input type="checkbox" id="${item.id}" ${checkedItems[item.id]?'checked':''} onchange="toggleCheck('${item.id}')"><label for="${item.id}">${item.text}</label></li>`).join('')}</ul></div>`).join('')}`;
}

window.toggleCheck=function(id){checkedItems[id]=!checkedItems[id];if(!checkedItems[id])delete checkedItems[id];saveChecklist();renderCompliance();}
window.resetChecklist=function(){if(confirm('Reset all checklist items?')){checkedItems={};saveChecklist();renderCompliance();}}

// ===================== MODAL UTILS =====================
window.openModal=function(id){document.getElementById(id).classList.add('open');}
window.closeModal=function(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');});});

// Init
showView('dashboard');
</script>
</body>
