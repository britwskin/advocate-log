<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advocate Workspace — Solace Health</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
  :root{
    --bg:#F6F7F9;--surface:#FFFFFF;--surface2:#EEF1F4;--border:#E2E6EB;
    --accent:#2C6E8A;--accent-light:#E6F2F7;--accent2:#3DAA74;--accent2-light:#E7F6EF;
    --warn:#C9622F;--warn-light:#FBEDE6;--purple:#7B5EA7;--purple-light:#F1ECF8;--gold:#C98A20;--gold-light:#FBF3E1;
    --text:#191D23;--text2:#576070;--text3:#9AA3B0;
    --mono:'IBM Plex Mono',monospace;--sans:'Inter',sans-serif;--radius:11px;--shadow:0 1px 4px rgba(20,30,50,.07);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;-webkit-tap-highlight-color:transparent;}
  .app{display:flex;height:100vh;overflow:hidden;}
  .sidebar{width:264px;min-width:264px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .main{flex:1;overflow-y:auto;padding:26px 30px;}
  .sidebar-header{padding:18px 18px 13px;border-bottom:1px solid var(--border);}
  .sidebar-header .logo{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:3px;}
  .sidebar-header h1{font-size:15px;font-weight:600;}
  .sync-status{font-size:10px;margin-top:5px;display:flex;align-items:center;gap:5px;color:var(--text3);}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);}
  .sync-dot.synced{background:var(--accent2);}.sync-dot.syncing{background:var(--gold);animation:pulse 1s infinite;}.sync-dot.error{background:var(--warn);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  .sidebar-nav{padding:10px;border-bottom:1px solid var(--border);}
  .nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 10px;border:none;background:none;border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--sans);color:var(--text2);font-weight:500;transition:all .15s;text-align:left;}
  .nav-btn:hover{background:var(--surface2);color:var(--text);}
  .nav-btn.active{background:var(--accent-light);color:var(--accent);font-weight:600;}
  .sidebar-patients{flex:1;overflow-y:auto;padding:10px;}
  .sidebar-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:6px 8px 8px;display:flex;justify-content:space-between;align-items:center;}
  .sidebar-label a{color:var(--accent);cursor:pointer;text-transform:none;letter-spacing:0;font-weight:500;font-size:11px;}
  .patient-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:2px;}
  .patient-item:hover{background:var(--surface2);}
  .patient-item.active{background:var(--accent-light);}
  .patient-avatar{width:30px;height:30px;border-radius:50%;color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .patient-info{flex:1;min-width:0;}
  .patient-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .patient-meta{font-size:11px;color:var(--text3);margin-top:1px;}
  .red-dot{width:8px;height:8px;border-radius:50%;background:var(--warn);flex-shrink:0;box-shadow:0 0 0 2px var(--warn-light);}
  .add-btn{margin:8px 10px;display:flex;align-items:center;justify-content:center;gap:7px;padding:9px;border:1.5px dashed var(--border);border-radius:8px;background:none;cursor:pointer;font-size:12px;font-family:var(--sans);color:var(--text3);font-weight:500;transition:all .15s;width:calc(100% - 20px);}
  .add-btn:hover{border-color:var(--accent);color:var(--accent);}
  .page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:12px;flex-wrap:wrap;}
  .page-title{font-size:21px;font-weight:600;letter-spacing:-.01em;}
  .page-subtitle{font-size:13px;color:var(--text2);margin-top:3px;}
  .btn{padding:8px 15px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-family:var(--sans);font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
  .btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:#235a73;}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}.btn-secondary:hover{background:var(--border);}
  .btn-success{background:var(--accent2);color:#fff;}.btn-success:hover{background:#2d8a5e;}
  .btn-danger{background:var(--warn-light);color:var(--warn);border:1px solid #f0c4ab;}.btn-danger:hover{background:#f7d9c9;}
  .btn-purple{background:var(--purple);color:#fff;}.btn-purple:hover{background:#674d8f;}
  .btn-sm{padding:5px 10px;font-size:12px;}
  .btn-lg{padding:12px 22px;font-size:15px;font-weight:600;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:19px;box-shadow:var(--shadow);margin-bottom:15px;}
  .card-title{font-size:13px;font-weight:600;margin-bottom:13px;display:flex;align-items:center;gap:8px;justify-content:space-between;}
  .card-title-left{display:flex;align-items:center;gap:8px;}
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px;box-shadow:var(--shadow);}
  .stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:6px;}
  .stat-value{font-size:25px;font-weight:600;font-family:var(--mono);line-height:1;}
  .stat-sub{font-size:11px;color:var(--text3);margin-top:4px;}
  .form-group{margin-bottom:13px;}
  .form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;}
  .form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--sans);color:var(--text);background:var(--surface);outline:none;transition:border-color .15s;}
  .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
  .form-textarea{resize:vertical;min-height:80px;line-height:1.5;}
  .modal-overlay{position:fixed;inset:0;background:rgba(15,23,38,.4);display:none;align-items:center;justify-content:center;z-index:1000;padding:16px;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border-radius:13px;width:600px;max-width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,.2);}
  .modal-sm{width:460px;}
  .modal-header{padding:18px 22px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:2;}
  .modal-title{font-size:16px;font-weight:600;}
  .modal-close{background:none;border:none;cursor:pointer;font-size:22px;color:var(--text3);line-height:1;}
  .modal-body{padding:19px 22px;}
  .modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--surface);}
  .tabs{display:flex;gap:3px;background:var(--surface2);padding:3px;border-radius:9px;margin-bottom:18px;flex-wrap:wrap;}
  .tab-btn{padding:7px 13px;border:none;background:none;border-radius:7px;cursor:pointer;font-size:12px;font-family:var(--sans);font-weight:500;color:var(--text2);transition:all .15s;}
  .tab-btn.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow);font-weight:600;}
  .alert{padding:11px 14px;border-radius:8px;font-size:12px;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px;line-height:1.5;}
  .alert-warn{background:var(--warn-light);color:var(--warn);border:1px solid #f0c4ab;}
  .alert-info{background:var(--accent-light);color:var(--accent);border:1px solid #bcdcea;}
  .alert-success{background:var(--accent2-light);color:var(--accent2);border:1px solid #aee0c8;}
  .hidden{display:none!important;}
  .empty-state{text-align:center;padding:38px 20px;color:var(--text3);}
  .empty-state .icon{font-size:34px;margin-bottom:10px;}
  .empty-state p{font-size:13px;}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:700px){.grid-2{grid-template-columns:1fr;}}
  /* Checklist (Before Next Call) */
  .bnc-section{margin-bottom:14px;}
  .bnc-section-title{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text2);margin-bottom:8px;}
  .bnc-item{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .bnc-item:last-child{border-bottom:none;}
  .bnc-item input[type=checkbox]{margin-top:1px;width:16px;height:16px;flex-shrink:0;cursor:pointer;accent-color:var(--accent);}
  .bnc-item.done .bnc-text{text-decoration:line-through;color:var(--text3);}
  .bnc-text{flex:1;line-height:1.4;cursor:text;}
  .bnc-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;opacity:.5;}
  .bnc-del:hover{opacity:1;color:var(--warn);}
  .bnc-add{display:flex;gap:6px;margin-top:8px;}
  .bnc-add input{flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--sans);outline:none;}
  .bnc-add input:focus{border-color:var(--accent);}
  /* Timeline */
  .tl-entry{background:var(--surface2);border-radius:9px;padding:13px 15px;margin-bottom:10px;border-left:3px solid var(--border);}
  .tl-entry.call{border-left-color:var(--accent);}
  .tl-entry.research{border-left-color:var(--purple);}
  .tl-entry.message{border-left-color:var(--gold);}
  .tl-entry.note{border-left-color:var(--text3);}
  .tl-entry.provider{border-left-color:var(--accent2);}
  .tl-entry.visit{border-left-color:var(--accent2);}
  .tl-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:8px;}
  .tl-badge{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border-radius:5px;background:var(--border);color:var(--text2);}
  .tl-badge.call{background:var(--accent-light);color:var(--accent);}
  .tl-badge.research{background:var(--purple-light);color:var(--purple);}
  .tl-badge.message{background:var(--gold-light);color:var(--gold);}
  .tl-badge.provider,.tl-badge.visit{background:var(--accent2-light);color:var(--accent2);}
  .tl-time{font-size:11px;color:var(--text3);font-family:var(--mono);}
  .tl-summary{font-size:13px;font-weight:500;margin-bottom:3px;}
  .tl-detail{font-size:12px;color:var(--text2);line-height:1.5;white-space:pre-wrap;}
  .tl-actions{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap;align-items:center;}
  .logged-check{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);cursor:pointer;user-select:none;}
  .logged-check input{width:15px;height:15px;accent-color:var(--accent2);cursor:pointer;}
  .logged-badge{font-size:11px;color:var(--accent2);font-weight:600;}
  /* Resource & generic tables */
  .rtable-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:9px;}
  .rtable{width:100%;border-collapse:collapse;font-size:12px;}
  .rtable th{background:var(--surface2);padding:9px 11px;text-align:left;font-weight:600;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;}
  .rtable td{padding:7px 11px;border-bottom:1px solid var(--border);vertical-align:top;}
  .rtable tr:last-child td{border-bottom:none;}
  .rtable td input,.rtable td textarea,.rtable td select{width:100%;border:none;background:transparent;font-size:12px;font-family:var(--sans);color:var(--text);outline:none;resize:none;padding:2px;}
  .rtable td input:focus,.rtable td textarea:focus,.rtable td select:focus{background:var(--accent-light);border-radius:4px;}
  .rtable tr:hover td{background:#FAFBFC;}
  .toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
  .toolbar input[type=text]{flex:1;min-width:140px;padding:7px 11px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-family:var(--sans);outline:none;}
  .toolbar input[type=text]:focus{border-color:var(--accent);}
  .toolbar select{padding:7px 10px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-family:var(--sans);background:var(--surface);outline:none;cursor:pointer;}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
  .pill-yes{background:var(--accent2-light);color:var(--accent2);}
  .pill-no{background:var(--warn-light);color:var(--warn);}
  .pill-pending{background:var(--gold-light);color:var(--gold);}
  /* Paste Anything */
  .paste-hero{background:linear-gradient(135deg,var(--accent-light),var(--purple-light));border:1px solid #cfdeea;border-radius:13px;padding:22px;margin-bottom:18px;}
  .paste-hero h2{font-size:17px;font-weight:600;margin-bottom:4px;}
  .paste-hero p{font-size:12px;color:var(--text2);margin-bottom:14px;}
  .paste-grid{display:grid;grid-template-columns:1fr 180px;gap:12px;}
  @media(max-width:640px){.paste-grid{grid-template-columns:1fr;}}
  /* Phrase items */
  .phrase-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:all .15s;}
  .phrase-item:hover{border-color:var(--accent);background:var(--accent-light);}
  .phrase-title{font-size:12px;font-weight:600;margin-bottom:3px;}
  .phrase-preview{font-size:11px;color:var(--text3);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .phrase-copied{font-size:11px;color:var(--accent2);font-weight:600;margin-top:4px;display:none;}
  .copy-note-btn{background:var(--purple-light);color:var(--purple);border:none;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--sans);}
  .copy-note-btn:hover{background:#e6dcf2;}
  /* Loading */
  #loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:13px;}
  #loading-screen .logo-big{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);}
  #loading-screen h2{font-size:18px;font-weight:600;}
  #loading-screen p{font-size:13px;color:var(--text2);}
  .spinner{width:26px;height:26px;border:3px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .archived-tag{font-size:10px;background:var(--surface2);color:var(--text3);padding:2px 7px;border-radius:5px;font-weight:600;}
  ::-webkit-scrollbar{width:7px;height:7px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  textarea.note-paste{min-height:160px;font-family:var(--mono);font-size:12px;}
</style>
</head>
<body>
<div id="loading-screen">
  <div class="logo-big">Solace Health</div>
  <div class="spinner"></div>
  <h2>Advocate Workspace</h2>
  <p>Connecting to your data...</p>
</div>
<div class="app" style="display:none" id="app-shell">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">Solace Health</div>
      <h1>Advocate Workspace</h1>
      <div class="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">Connecting...</span></div>
    </div>
    <div class="sidebar-nav">
      <button class="nav-btn active" id="nav-dashboard" onclick="showView('dashboard')"><span>🏠</span> Dashboard</button>
      <button class="nav-btn" id="nav-paste" onclick="showView('paste')"><span>➕</span> Paste Anything</button>
      <button class="nav-btn" id="nav-phrases" onclick="showView('phrases')"><span>💬</span> Quick Phrases</button>
      <button class="nav-btn" id="nav-templates" onclick="showView('templates')"><span>📝</span> Templates</button>
      <button class="nav-btn" id="nav-library" onclick="showView('library')"><span>🌎</span> Resource Library</button>
    </div>
    <div class="sidebar-patients">
      <div class="sidebar-label"><span>Patients</span><a id="toggle-archived" onclick="toggleArchivedView()">Show archived</a></div>
      <div id="patient-list"></div>
    </div>
    <button class="add-btn" onclick="openAddPatient()">＋ Add Patient</button>
  </div>
  <div class="main" id="main-content"></div>
</div>

<!-- Modals -->
<div class="modal-overlay" id="modal-patient">
  <div class="modal modal-sm">
    <div class="modal-header"><div class="modal-title">Add Patient</div><button class="modal-close" onclick="closeModal('modal-patient')">×</button></div>
    <div class="modal-body">
      <div class="grid-2">
        <div class="form-group"><label class="form-label">First Name / Initials *</label><input class="form-input" id="p-firstname" placeholder="J or Jane"></div>
        <div class="form-group"><label class="form-label">Last Name / Initial *</label><input class="form-input" id="p-lastname" placeholder="D or Doe"></div>
      </div>
      <div class="form-group"><label class="form-label">Insurance / Plan</label><input class="form-input" id="p-insurance" placeholder="e.g. BlueCross PPO"></div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="p-notes" placeholder="Key context, diagnosis, priorities..."></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('modal-patient')">Cancel</button><button class="btn btn-primary" onclick="savePatient()">Add Patient</button></div>
  </div>
</div>

<div class="modal-overlay" id="modal-resgroup">
  <div class="modal modal-sm">
    <div class="modal-header"><div class="modal-title">New Resource Tracker</div><button class="modal-close" onclick="closeModal('modal-resgroup')">×</button></div>
    <div class="modal-body"><div class="form-group"><label class="form-label">Tracker Name *</label><input class="form-input" id="rg-name" placeholder="Housing, Scooter, DME, Financial..."></div></div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('modal-resgroup')">Cancel</button><button class="btn btn-primary" onclick="saveResourceGroup()">Create</button></div>
  </div>
</div>

<div class="modal-overlay" id="modal-provider">
  <div class="modal modal-sm">
    <div class="modal-header"><div class="modal-title">Add Provider</div><button class="modal-close" onclick="closeModal('modal-provider')">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Provider *</label><input class="form-input" id="pr-name" placeholder="Dr. Smith / Clinic name"></div>
      <div class="form-group"><label class="form-label">Specialty</label><input class="form-input" id="pr-specialty" placeholder="Cardiology, PCP..."></div>
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="pr-phone"></div>
        <div class="form-group"><label class="form-label">Fax</label><input class="form-input" id="pr-fax"></div>
      </div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="pr-email"></div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="pr-notes"></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('modal-provider')">Cancel</button><button class="btn btn-primary" onclick="saveProvider()">Add Provider</button></div>
  </div>
</div>

<div class="modal-overlay" id="modal-doc">
  <div class="modal modal-sm">
    <div class="modal-header"><div class="modal-title">Add Document</div><button class="modal-close" onclick="closeModal('modal-doc')">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Title *</label><input class="form-input" id="doc-title" placeholder="Monthly Report - June, Appeal Letter..."></div>
      <div class="form-group"><label class="form-label">Type</label><select class="form-select" id="doc-type"><option>Monthly Report</option><option>Appeal Letter</option><option>Insurance Document</option><option>Clinical Note</option><option>Correspondence</option><option>Other</option></select></div>
      <div class="form-group"><label class="form-label">Content</label><textarea class="form-textarea" id="doc-content" style="min-height:160px" placeholder="Paste document text here..."></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('modal-doc')">Cancel</button><button class="btn btn-primary" onclick="saveDocument()">Save Document</button></div>
  </div>
</div>

<div class="modal-overlay" id="modal-library">
  <div class="modal modal-sm">
    <div class="modal-header"><div class="modal-title">Add to Resource Library</div><button class="modal-close" onclick="closeModal('modal-library')">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Organization *</label><input class="form-input" id="lib-org" placeholder="American Cancer Society"></div>
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Category</label><input class="form-input" id="lib-cat" placeholder="Transportation, Housing..."></div>
        <div class="form-group"><label class="form-label">Service Offered</label><input class="form-input" id="lib-service" placeholder="Gas cards, lodging..."></div>
      </div>
      <div class="form-group"><label class="form-label">Eligibility</label><input class="form-input" id="lib-elig" placeholder="Who qualifies?"></div>

onSnapshot(collection(db,'patients'),snap=>{

onSnapshot(collection(db,'meta'),snap=>{

async function fbSave(col,id,data){setSync('syncing');await setDoc(doc(db,col,id),data);setSync('synced');}
async function fbDel(col,id){setSync('syncing');await deleteDoc(doc(db,col,id));setSync('synced');}

// ===== HELPERS =====
function initials(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function fmtDate(iso){if(!iso)return'';return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fmtTime(iso){if(!iso)return'';return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
function fmtDT(iso){return`${fmtDate(iso)} · ${fmtTime(iso)}`;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pById(id){return S.patients.find(p=>p.id===id);}
function pName(id){const p=pById(id);return p?`${p.firstName} ${p.lastName}`:'Unknown';}
function pColor(id){const c=['#2C6E8A','#3DAA74','#7B5EA7','#C9622F','#4A90B8','#2E8B57','#674d8f','#D4752A'];let h=0;for(let ch of(id||''))h=(h*31+ch.charCodeAt(0))&0xffff;return c[h%c.length];}
function patientEntries(pid){return S.entries.filter(e=>e.patientId===pid).sort((a,b)=>new Date(b.date)-new Date(a.date));}
function needsLogging(pid){return S.entries.filter(e=>e.patientId===pid&&!e.logged).length;}
function activePatients(){return S.patients.filter(p=>!p.archived);}

function rerender(){
  if(S.view==='dashboard')renderDashboard();
  else if(S.view==='paste')renderPaste();
  else if(S.view==='phrases')renderPhrases();
  else if(S.view==='templates')renderTemplates();

}

window.showView=function(v,pid){

};

window.toggleArchivedView=function(){S.showArchived=!S.showArchived;document.getElementById('toggle-archived').textContent=S.showArchived?'Hide archived':'Show archived';renderSidebar();};

function renderSidebar(){
  const list=document.getElementById('patient-list');if(!list)return;

  if(!pats.length){list.innerHTML=`<div style="padding:8px 10px;font-size:12px;color:var(--text3)">No ${S.showArchived?'':'active '}patients</div>`;return;}

      ${need&&!p.archived?`<div class="red-dot" title="${need} need logging"></div>`:''}
    </div>`;

}

// ===== DASHBOARD =====
function renderDashboard(){
  const main=document.getElementById('main-content');if(!main)return;
  const today=new Date();today.setHours(0,0,0,0);
  const tomorrow=new Date(today);tomorrow.setDate(tomorrow.getDate()+1);

  const needLog=S.entries.filter(e=>!e.logged&&pById(e.patientId)&&!pById(e.patientId).archived).sort((a,b)=>new Date(b.date)-new Date(a.date));
  // Tasks due today across patients (from before-next-call "todo" items)
  let tasksDue=[];
  activePatients().forEach(p=>{(p.bncTodo||[]).forEach((t,i)=>{if(!t.done)tasksDue.push({pid:p.id,pname:`${p.firstName} ${p.lastName}`,text:t.text,idx:i});});});

    <div class="page-header">

      <div class="stat-card"><div class="stat-label">Open Tasks</div><div class="stat-value">${tasksDue.length}</div><div class="stat-sub">before next calls</div></div>

    <div class="grid-2">

          needLog.slice(0,12).map(e=>`<div class="bnc-item">
            <div style="flex:1"><div style="font-size:13px;font-weight:500">${esc(e.summary||e.type)}</div><div style="font-size:11px;color:var(--text3)">${esc(pName(e.patientId))} · ${fmtDate(e.date)}</div></div>
            <button class="btn btn-success btn-sm" onclick="markLogged('${e.id}')">✓ Logged</button>
          </div>`).join('')}
      </div>
      <div class="card">
        <div class="card-title"><span class="card-title-left">📋 Tasks — Before Next Call</span></div>
        ${tasksDue.length===0?`<div class="empty-state" style="padding:20px"><p>No open tasks.</p></div>`:
          tasksDue.slice(0,14).map(t=>`<div class="bnc-item">
            <input type="checkbox" onchange="completeTask('${t.pid}',${t.idx})">
            <div class="bnc-text" onclick="showView('patient','${t.pid}')" style="cursor:pointer">${esc(t.text)} <span style="color:var(--text3);font-size:11px">— ${esc(t.pname)}</span></div>
          </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title"><span class="card-title-left">💬 Quick Phrases</span><button class="btn btn-secondary btn-sm" onclick="showView('phrases')">View all</button></div>
      <p style="font-size:12px;color:var(--text2)">Tap a category to copy common documentation and communication templates.</p>
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
        <button class="btn btn-secondary btn-sm" onclick="showView('phrases')">📁 Documentation</button>
        <button class="btn btn-secondary btn-sm" onclick="showView('phrases')">📁 Provider Communications</button>
        <button class="btn btn-secondary btn-sm" onclick="showView('phrases')">📁 Patient Communications</button>
      </div>
    </div>`;
}

window.markLogged=async function(eid){const e=S.entries.find(x=>x.id===eid);if(!e)return;e.logged=true;await fbSave('entries',eid,e);};
window.completeTask=async function(pid,idx){const p=pById(pid);if(!p||!p.bncTodo)return;p.bncTodo[idx].done=true;await fbSave('patients',pid,p);};

// ===== PASTE ANYTHING =====
let pasteState={content:'',pid:'',template:''};
function renderPaste(){
  const main=document.getElementById('main-content');if(!main)return;
  const pats=activePatients();
  main.innerHTML=`
    <div class="page-header"><div><div class="page-title">Paste Anything</div><div class="page-subtitle">One entry point for transcripts, research, emails, portal messages, and notes</div></div></div>
    <div class="paste-hero">
      <h2>✨ What do you have?</h2>
      <p>Paste a PLAUD transcript, research, an email, a portal message, or any notes. Choose the patient and a note style, then generate a clinical note to review and copy into Solace.</p>
      <div class="paste-grid">

            <select class="form-select" id="paste-patient">
              <option value="">— Select patient —</option>
              ${pats.map(p=>`<option value="${p.id}" ${pasteState.pid===p.id?'selected':''}>${esc(p.firstName)} ${esc(p.lastName)}</option>`).join('')}
            </select>
          </div>
          <div class="form-group"><label class="form-label">Content Type</label>
            <select class="form-select" id="paste-type">
              <option value="auto">Auto-detect</option>
              <option value="call">Phone Call / Transcript</option>
              <option value="research">Research</option>
              <option value="message">Message / Email</option>
              <option value="note">Manual Note</option>
              <option value="provider">Provider Call</option>
            </select>
          </div>
          <div class="form-group"><label class="form-label">Note Style</label>
            <select class="form-select" id="paste-template">
              <option value="Standard Clinical Note">Standard Clinical Note</option>
              <option value="Concise Clinical Note">Concise Clinical Note</option>
              <option value="Narrative Style">Narrative Style</option>

              ${S.templates.map(t=>`<option value="custom:${t.id}">⭐ ${esc(t.name)}</option>`).join('')}
            </select>
          </div>
          <button class="btn btn-primary btn-lg" style="width:100%" onclick="processPaste()">✨ Process</button>
        </div>

    </div>
    <div class="alert alert-info">💡 Processing builds a ready-to-send prompt and opens Claude. Paste the prompt into Claude (the app you already have), copy its reply, then save it to the patient's timeline — with a checkbox to mark it logged in Solace.</div>`;
  document.getElementById('paste-content').addEventListener('input',e=>pasteState.content=e.target.value);
}

window.processPaste=function(){
  const content=document.getElementById('paste-content').value.trim();
  const pid=document.getElementById('paste-patient').value;
  const type=document.getElementById('paste-type').value;
  const tplVal=document.getElementById('paste-template').value;
  if(!content){alert('Paste some content first.');return;}
  if(!pid){alert('Please select a patient.');return;}
  let styleInstr='';
  let styleName=tplVal;
  if(tplVal.startsWith('custom:')){const t=S.templates.find(x=>x.id===tplVal.slice(7));if(t){styleInstr=t.instr;styleName=t.name;}}
  else{styleInstr=builtInStyle(tplVal);}
  const behaviors=Object.keys(S.aiBehaviors).filter(k=>S.aiBehaviors[k]).map(k=>BEHAVIOR_LABELS[k]).filter(Boolean);
  const p=pById(pid);
  const prompt=buildPrompt(content,type,styleName,styleInstr,behaviors,p);
  openProcessModal(prompt,pid,type);
};

const BEHAVIOR_LABELS={concise:'Be concise.',natural:'Sound natural, not robotic.',novary:'Avoid repetitive wording; vary sentence openings.',nurse:'Read like a nurse advocate wrote it.',solace:'Be appropriate for Solace documentation.'};

function builtInStyle(name){
  const m={
    'Standard Clinical Note':'A clear, professional clinical note with the key facts, actions taken, and next steps.',
    'Concise Clinical Note':'A short, tight clinical note — only essential facts, actions, and next steps. No filler.',
    'Narrative Style':'A flowing narrative paragraph describing what happened in natural prose.',
    'Provider Summary':'A brief summary suitable to share with a provider, focused on clinical relevance.',
    'Monthly Report Style':'A summary suitable for a monthly advocacy report: actions over the period, priorities, and next steps.',
    'Research Summary':'A structured summary of the research: what was found, eligibility/relevance, and recommended next steps.'
  };
  return m[name]||m['Standard Clinical Note'];
}

function buildPrompt(content,type,styleName,styleInstr,behaviors,p){
  let out=`You are helping a nurse patient-advocate at Solace Health write a clinical note.\n\n`;
  out+=`STYLE: ${styleName}\n${styleInstr}\n\n`;
  if(behaviors.length)out+=`The note should:\n${behaviors.map(b=>'- '+b).join('\n')}\n\n`;
  out+=`Patient: ${p?p.firstName+' '+p.lastName:'(patient)'}\n`;
  if(type!=='auto')out+=`Content type: ${type}\n`;
  out+=`\nHere is the content to turn into a clinical note:\n"""\n${content}\n"""\n\n`;
  out+=`Write only the clinical note, ready to paste into Solace. After the note, on a new line, list any follow-up tasks as "TASK: ..." and anything to flag for the next call as "ASK: ...".`;
  return out;
}

function openProcessModal(prompt,pid,type){
  const body=document.getElementById('process-body');
  body.innerHTML=`
    <div class="alert alert-info">Step 1: Copy this prompt. Step 2: Open Claude and paste it. Step 3: Copy Claude's note back into the box below and save it to the timeline.</div>
    <div class="form-group"><label class="form-label">Prompt for Claude</label>
      <textarea class="form-textarea" id="proc-prompt" style="min-height:130px;font-size:12px" readonly>${esc(prompt)}</textarea>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn btn-purple btn-sm" onclick="copyText(document.getElementById('proc-prompt').value,this)">📋 Copy Prompt</button>
        <a class="btn btn-secondary btn-sm" href="https://claude.ai/new" target="_blank">Open Claude ↗</a>
      </div>
    </div>
    <hr style="border:none;border-top:1px solid var(--border);margin:16px 0">
    <div class="form-group"><label class="form-label">Paste Claude's note here</label>
      <textarea class="form-textarea" id="proc-result" style="min-height:120px" placeholder="Paste the generated clinical note..."></textarea>
    </div>
    <div class="form-group"><label class="form-label">Short summary (for timeline)</label><input class="form-input" id="proc-summary" placeholder="e.g. Called Medicare re: DME coverage"></div>
    <button class="btn btn-success" style="width:100%" onclick="saveProcessedEntry('${pid}','${type}')">Save to Timeline</button>`;
  openModal('modal-process');
}

window.saveProcessedEntry=async function(pid,type){
  const result=document.getElementById('proc-result').value.trim();
  const summary=document.getElementById('proc-summary').value.trim();
  if(!result){alert('Paste the clinical note first.');return;}
  const realType=type==='auto'?'note':type;
  const entry={id:uid(),patientId:pid,type:realType,date:new Date().toISOString(),summary:summary||'Processed entry',clinicalNote:result,source:pasteState.content,logged:false,tasks:extractTagged(result,'TASK:'),asks:extractTagged(result,'ASK:')};
  // push tasks/asks into patient's before-next-call
  const p=pById(pid);
  if(p){p.bncTodo=p.bncTodo||[];p.bncAsk=p.bncAsk||[];entry.tasks.forEach(t=>p.bncTodo.push({text:t,done:false}));entry.asks.forEach(a=>p.bncAsk.push({text:a,done:false}));await fbSave('patients',pid,p);}
  await fbSave('entries',entry.id,entry);
  pasteState={content:'',pid:'',template:''};
  closeModal('modal-process');
  showView('patient',pid);
};

function extractTagged(text,tag){return text.split('\n').filter(l=>l.trim().toUpperCase().startsWith(tag)).map(l=>l.trim().slice(tag.length).trim()).filter(Boolean);}

window.copyText=function(text,btn){
  navigator.clipboard.writeText(text).then(()=>{const o=btn.textContent;btn.textContent='✓ Copied!';setTimeout(()=>btn.textContent=o,1800);}).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);const o=btn.textContent;btn.textContent='✓ Copied!';setTimeout(()=>btn.textContent=o,1800);});
};

function renderBNC(p){
  const todo=p.bncTodo||[],ask=p.bncAsk||[];
  return`<div class="card">
    <div class="bnc-section">
      <div class="bnc-section-title">☐ Things I Need To Do</div>
      ${todo.length===0?`<div style="font-size:12px;color:var(--text3);padding:4px 0">Nothing yet.</div>`:todo.map((t,i)=>`<div class="bnc-item ${t.done?'done':''}">

function bncKey(t){return t==='todo'?'bncTodo':'bncAsk';}
window.addBnc=async function(pid,t){const inp=document.getElementById('bnc-'+t+'-input');const v=inp.value.trim();if(!v)return;const p=pById(pid);p[bncKey(t)]=p[bncKey(t)]||[];p[bncKey(t)].push({text:v,done:false});await fbSave('patients',pid,p);renderPatient(pid);};
window.toggleBnc=async function(pid,t,i){const p=pById(pid);p[bncKey(t)][i].done=!p[bncKey(t)][i].done;await fbSave('patients',pid,p);renderPatient(pid);};
window.editBnc=async function(pid,t,i,v){const p=pById(pid);if(p[bncKey(t)][i]){p[bncKey(t)][i].text=v.trim();await fbSave('patients',pid,p);}};
window.delBnc=async function(pid,t,i){const p=pById(pid);p[bncKey(t)].splice(i,1);await fbSave('patients',pid,p);renderPatient(pid);};

function renderTimeline(pid){
  const entries=patientEntries(pid);
  if(!entries.length)return`<div class="empty-state"><div class="icon">🕒</div><p>No timeline entries yet. Use "Paste" to add one.</p></div>`;
  return entries.map(e=>{

      <div class="tl-head"><span class="tl-badge ${e.type}">${e.type}</span><span class="tl-time">${fmtDT(e.date)}</span></div>
      <div class="tl-summary">${esc(e.summary||'')}</div>
      ${note?`<div class="tl-detail">${esc(note.length>400?note.slice(0,400)+'…':note)}</div>`:''}
      <div class="tl-actions">

// ----- Resources (per patient) -----
let resFilter={};
function renderResources(p){
  const groups=p.resources||[];
  let html=`<div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:14px">
    <button class="btn btn-secondary btn-sm" onclick="openImportLibrary('${p.id}')">⬇ Import from Library</button>
    <button class="btn btn-primary btn-sm" onclick="openAddResourceGroup('${p.id}')">＋ New Tracker</button>
  </div>`;
  if(!groups.length)return html+`<div class="empty-state"><div class="icon">📋</div><p>No resource trackers yet.</p></div>`;
  groups.forEach((g,gi)=>{
    const f=resFilter[p.id+'_'+gi]||{q:'',status:''};
    let rows=(g.rows||[]).map((r,ri)=>({r,ri}));
    if(f.q)rows=rows.filter(x=>JSON.stringify(x.r).toLowerCase().includes(f.q.toLowerCase()));
    if(f.status)rows=rows.filter(x=>x.r.eligible===f.status);
    html+=`<div class="card">
      <div class="card-title"><span class="card-title-left">📋 ${esc(g.name)}</span>
        <span><button class="btn btn-secondary btn-sm" onclick="addResRow('${p.id}',${gi})">＋ Row</button>
        <button class="btn btn-danger btn-sm" onclick="delResGroup('${p.id}',${gi})">Delete</button></span>
      </div>
      <div class="toolbar">
        <input type="text" placeholder="Search ${esc(g.name)}..." value="${esc(f.q)}" oninput="setResFilter('${p.id}',${gi},'q',this.value)">
        <select onchange="setResFilter('${p.id}',${gi},'status',this.value)">
          <option value="">All eligibility</option>
          <option value="Yes" ${f.status==='Yes'?'selected':''}>Eligible</option>
          <option value="No" ${f.status==='No'?'selected':''}>Not eligible</option>
          <option value="Pending" ${f.status==='Pending'?'selected':''}>Pending</option>
          <option value="Conditional" ${f.status==='Conditional'?'selected':''}>Conditional</option>
        </select>
      </div>
      <div class="rtable-wrap"><table class="rtable">
        <thead><tr><th style="min-width:130px">Organization</th><th style="min-width:90px">Eligible?</th><th style="min-width:110px">Status</th><th style="min-width:200px">Notes</th><th style="min-width:80px">Logged?</th><th style="width:60px"></th></tr></thead>
        <tbody>
        ${rows.map(({r,ri})=>`<tr>
          <td><input value="${esc(r.org||'')}" onchange="updRes('${p.id}',${gi},${ri},'org',this.value)" placeholder="Organization"></td>
          <td><select onchange="updRes('${p.id}',${gi},${ri},'eligible',this.value)"><option value="" ${!r.eligible?'selected':''}>—</option><option ${r.eligible==='Yes'?'selected':''}>Yes</option><option ${r.eligible==='No'?'selected':''}>No</option><option ${r.eligible==='Pending'?'selected':''}>Pending</option><option ${r.eligible==='Conditional'?'selected':''}>Conditional</option></select></td>
          <td><input value="${esc(r.status||'')}" onchange="updRes('${p.id}',${gi},${ri},'status',this.value)" placeholder="Emailed, waiting..."></td>
          <td><textarea rows="2" onchange="updRes('${p.id}',${gi},${ri},'notes',this.value)" placeholder="Contact, conditions, dates...">${esc(r.notes||'')}</textarea></td>
          <td><select onchange="updRes('${p.id}',${gi},${ri},'logged',this.value)"><option value="" ${!r.logged?'selected':''}>—</option><option ${r.logged==='Yes'?'selected':''}>Yes</option><option ${r.logged==='No'?'selected':''}>No</option></select></td>
          <td style="white-space:nowrap"><button onclick="dupResRow('${p.id}',${gi},${ri})" title="Duplicate" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px">⎘</button><button onclick="delResRow('${p.id}',${gi},${ri})" title="Delete" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px">×</button></td>
        </tr>`).join('')}
        </tbody>
      </table></div>
      ${!rows.length?`<div style="text-align:center;padding:14px;color:var(--text3);font-size:12px">No matching rows.</div>`:''}
    </div>`;
  });
  return html;
}
window.setResFilter=function(pid,gi,k,v){resFilter[pid+'_'+gi]=resFilter[pid+'_'+gi]||{q:'',status:''};resFilter[pid+'_'+gi][k]=v;renderPatient(pid);if(k==='q'){setTimeout(()=>{const inp=document.querySelector(`.toolbar input[type=text]`);},0);}};
window.openAddResourceGroup=function(pid){S.pid=pid;document.getElementById('rg-name').value='';openModal('modal-resgroup');};
window.saveResourceGroup=async function(){const name=document.getElementById('rg-name').value.trim();if(!name)return;const p=pById(S.pid);p.resources=p.resources||[];p.resources.push({name,rows:[]});await fbSave('patients',S.pid,p);closeModal('modal-resgroup');setTab('resources');};
window.addResRow=async function(pid,gi){const p=pById(pid);p.resources[gi].rows=p.resources[gi].rows||[];p.resources[gi].rows.push({org:'',eligible:'',status:'',notes:'',logged:''});await fbSave('patients',pid,p);renderPatient(pid);};
window.updRes=async function(pid,gi,ri,f,v){const p=pById(pid);p.resources[gi].rows[ri][f]=v;await fbSave('patients',pid,p);};
window.dupResRow=async function(pid,gi,ri){const p=pById(pid);const copy={...p.resources[gi].rows[ri]};p.resources[gi].rows.splice(ri+1,0,copy);await fbSave('patients',pid,p);renderPatient(pid);};
window.delResRow=async function(pid,gi,ri){const p=pById(pid);p.resources[gi].rows.splice(ri,1);await fbSave('patients',pid,p);renderPatient(pid);};
window.delResGroup=async function(pid,gi){if(!confirm('Delete this tracker?'))return;const p=pById(pid);p.resources.splice(gi,1);await fbSave('patients',pid,p);renderPatient(pid);};

window.openImportLibrary=function(pid){

window.importLibItem=async function(itemId){

let scratchTimer=null;
function renderScratch(p,c){
  c.innerHTML=`<div class="card">
    <div class="card-title"><span class="card-title-left">📝 Scratch Pad</span><span style="font-size:11px;color:var(--text3)" id="scratch-status">Auto-saves</span></div>
    <textarea class="form-textarea" id="scratch-text" style="min-height:240px" placeholder="Running notes — no formatting needed. Jot anything here.">${esc(p.scratch||'')}</textarea>
    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
      <button class="btn btn-secondary btn-sm" onclick="scratchConvert('${p.id}','timeline')">→ Timeline Entry</button>
      <button class="btn btn-secondary btn-sm" onclick="scratchConvert('${p.id}','tasks')">→ Task List</button>
      <button class="btn btn-purple btn-sm" onclick="scratchConvert('${p.id}','note')">→ Clinical Note (via Claude)</button>
    </div>
  </div>`;
  const ta=document.getElementById('scratch-text');
  ta.addEventListener('input',()=>{clearTimeout(scratchTimer);document.getElementById('scratch-status').textContent='Saving...';scratchTimer=setTimeout(async()=>{const pp=pById(p.id);pp.scratch=ta.value;await fbSave('patients',p.id,pp);document.getElementById('scratch-status').textContent='Saved ✓';},800);});
}
window.scratchConvert=async function(pid,mode){
  const p=pById(pid);const text=(document.getElementById('scratch-text').value||'').trim();
  if(!text){alert('Scratch pad is empty.');return;}
  if(mode==='timeline'){const entry={id:uid(),patientId:pid,type:'note',date:new Date().toISOString(),summary:text.slice(0,60),clinicalNote:text,logged:false,tasks:[],asks:[]};await fbSave('entries',entry.id,entry);alert('Added to timeline.');setTab('timeline');}
  else if(mode==='tasks'){p.bncTodo=p.bncTodo||[];text.split('\n').map(l=>l.replace(/^[-*•\s]+/,'').trim()).filter(Boolean).forEach(t=>p.bncTodo.push({text:t,done:false}));await fbSave('patients',pid,p);alert('Lines added as tasks in Before Next Call.');setTab('bnc');}
  else if(mode==='note'){pasteState.content=text;pasteState.pid=pid;showView('paste');setTimeout(()=>{const cEl=document.getElementById('paste-content');if(cEl)cEl.value=text;const s=document.getElementById('paste-patient');if(s)s.value=pid;},60);}
};

  {cat:'Provider Communications',title:'Advocate Introduction & Records Request (Warm)',text:"*Letter of Authorization & Consent to Treatment forms attached*\nGood afternoon! I'm an RN Care Advocate working remotely with _____ to help him/her navigate access to care via Solace, a healthcare advocacy organization. I'm requesting any available records, especially in regards to ________________, to be faxed to (XXX)XXX-XXXX for addition to ________'s file with Solace Health.\nI hope to be of service both to ______ and your office in helping him/her continue to safely access the vital care that s/he needs - please feel free to reach out at any time should you have additional questions for me or if there is anything I can do to assist you in helping him/her keep up with his/her treatment. I can be reached via call/text at (XXX)XXX-XXXX or email via ______@solace.health.\nThank you for all you do - your care for ______ is appreciated!"},
  {cat:'Provider Communications',title:'Advocate Introduction (Role Clarification)',text:"*Letter of Authorization and Consent to Treatment forms attached*\nGood afternoon - I'm a Care Advocate working with _______ to help him/her navigate Medicare and the healthcare system via Solace Health, a healthcare advocacy organization. My role as an advocate is primarily to assist with healthcare navigation and lowering administrative burden on the patient, rather than participating in treatment decisions or direct care. I welcome any questions or requests with regard to my role and how I can help ______ stay on track in his/her care - please feel free to reach me via return fax, by phone at (XXX)XXX-XXXX, or via email at ____________.\nThank you for being part of ______'s care team!"},

  {cat:'Provider Communications',title:'New Advocate Introduction to Care Team',text:"Good afternoon! I have recently taken over ______'s case as their healthcare advocate, and wanted to reach out to introduce myself. My role is primarily to support ______ in accessing the care that s/he needs and keeping up with treatments and provider recommendations. I'd welcome any questions or requests in regards to my role and how I can help ______ stay on track in their care - please feel free to reach me via return fax, by phone at (XXX)XXX-XXXX, or via email at __________@solaceadvocates.com.\nThank you for being part of _______'s care team!"},

  {cat:'Patient Communications',title:'New Patient Introduction (Voicemail Follow-Up)',text:'Good afternoon _______. My name is _____ and I am a Care Advocate with Solace Health. I just received you as one of my patients. I wanted to get in touch to schedule an intake appointment and learn how I can best assist you. Please call me back at xxx-xxx-xxxx. I will also send you an e-mail and you can e-mail me as well. Thank you and have a great day!'},

let phraseData={};
function renderPhrases(){
  const main=document.getElementById('main-content');if(!main)return;
  const cats=[...new Set(PHRASES.map(p=>p.cat))];
  phraseData={};PHRASES.forEach((p,i)=>phraseData['ph'+i]=p.text);
  main.innerHTML=`<div class="page-header"><div><div class="page-title">Quick Phrases</div><div class="page-subtitle">Tap any phrase to copy it</div></div></div>
  ${cats.map(cat=>`<div class="card"><div class="card-title"><span class="card-title-left">📁 ${cat}</span></div>
    ${PHRASES.map((p,i)=>p.cat===cat?`<div class="phrase-item" onclick="copyPhrase('ph${i}',this)"><div class="phrase-title">${esc(p.title)}</div><div class="phrase-preview">${esc(p.text.replace(/\n/g,' ').slice(0,110))}...</div><div class="phrase-copied">✓ Copied!</div></div>`:'').join('')}
  </div>`).join('')}`;
}
window.copyPhrase=function(key,el){const text=phraseData[key];navigator.clipboard.writeText(text).then(()=>showCopied(el)).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showCopied(el);});};
function showCopied(el){const c=el.querySelector('.phrase-copied');if(c){c.style.display='block';setTimeout(()=>c.style.display='none',2000);}}

// ===== TEMPLATES =====
function renderTemplates(){
  const main=document.getElementById('main-content');if(!main)return;
  main.innerHTML=`<div class="page-header"><div><div class="page-title">Templates</div><div class="page-subtitle">Note styles, AI behaviors, and your custom templates</div></div></div>
  <div class="card">
    <div class="card-title"><span class="card-title-left">📄 Clinical Note Styles</span></div>
    <p style="font-size:12px;color:var(--text2);margin-bottom:10px">Built-in styles you can pick when processing. Rotate them to keep documentation varied.</p>
    ${['Standard Clinical Note','Concise Clinical Note','Narrative Style','Provider Summary','Monthly Report Style','Research Summary'].map(s=>`<div class="bnc-item"><span style="font-size:13px">✔ ${s}</span></div>`).join('')}
  </div>
  <div class="card">
    <div class="card-title"><span class="card-title-left">🤖 AI Behaviors</span></div>
    <p style="font-size:12px;color:var(--text2);margin-bottom:10px">My clinical notes should…</p>
    ${Object.entries(BEHAVIOR_LABELS).map(([k,v])=>`<div class="bnc-item"><input type="checkbox" ${S.aiBehaviors[k]?'checked':''} onchange="toggleBehavior('${k}')"><div class="bnc-text">${v}</div></div>`).join('')}
  </div>
  <div class="card">
    <div class="card-title"><span class="card-title-left">⭐ My Custom Templates</span><button class="btn btn-primary btn-sm" onclick="openAddTemplate()">＋ New</button></div>
    ${S.templates.length===0?`<div style="font-size:12px;color:var(--text3)">No custom templates yet. Save your favorite note styles here.</div>`:
      S.templates.map(t=>`<div class="bnc-item"><div class="bnc-text"><strong>${esc(t.name)}</strong><div style="font-size:11px;color:var(--text3)">${esc((t.instr||'').slice(0,80))}</div></div><button class="bnc-del" onclick="delTemplate('${t.id}')">×</button></div>`).join('')}
  </div>`;
}
window.toggleBehavior=async function(k){S.aiBehaviors[k]=!S.aiBehaviors[k];await fbSave('meta','aiBehaviors',S.aiBehaviors);};
window.openAddTemplate=function(){['tpl-name','tpl-instr'].forEach(id=>document.getElementById(id).value='');openModal('modal-template');};
window.saveTemplate=async function(){const name=document.getElementById('tpl-name').value.trim();if(!name){alert('Enter a name.');return;}S.templates.push({id:uid(),name,instr:document.getElementById('tpl-instr').value.trim()});await fbSave('meta','templates',{items:S.templates});closeModal('modal-template');renderTemplates();};
window.delTemplate=async function(id){if(!confirm('Delete this template?'))return;S.templates=S.templates.filter(t=>t.id!==id);await fbSave('meta','templates',{items:S.templates});renderTemplates();};

// ===== RESOURCE LIBRARY =====
let libFilter='';
function renderLibrary(){
  const main=document.getElementById('main-content');if(!main)return;
  let items=S.library;
  if(libFilter)items=items.filter(i=>JSON.stringify(i).toLowerCase().includes(libFilter.toLowerCase()));
  main.innerHTML=`<div class="page-header"><div><div class="page-title">Resource Library</div><div class="page-subtitle">Your personal database of organizations — import into any patient</div></div><button class="btn btn-primary" onclick="openAddLibrary()">＋ Add Organization</button></div>
  <div class="toolbar"><input type="text" placeholder="Search library..." value="${esc(libFilter)}" oninput="libFilter=this.value;renderLibrary()"></div>
  ${items.length===0?`<div class="empty-state"><div class="icon">🌎</div><p>${libFilter?'No matches.':'No organizations saved yet.'}</p></div>`:
    `<div class="rtable-wrap"><table class="rtable"><thead><tr><th>Organization</th><th>Category</th><th>Service</th><th>Eligibility</th><th>Website</th><th>Phone</th><th>Notes</th><th></th></tr></thead><tbody>
    ${items.map(it=>`<tr>
      <td><input value="${esc(it.org||'')}" onchange="updLib('${it.id}','org',this.value)"></td>
      <td><input value="${esc(it.category||'')}" onchange="updLib('${it.id}','category',this.value)"></td>
      <td><input value="${esc(it.service||'')}" onchange="updLib('${it.id}','service',this.value)"></td>
      <td><input value="${esc(it.eligibility||'')}" onchange="updLib('${it.id}','eligibility',this.value)"></td>
      <td><input value="${esc(it.web||'')}" onchange="updLib('${it.id}','web',this.value)"></td>
      <td><input value="${esc(it.phone||'')}" onchange="updLib('${it.id}','phone',this.value)"></td>
      <td><textarea rows="2" onchange="updLib('${it.id}','notes',this.value)">${esc(it.notes||'')}</textarea></td>
      <td><button onclick="delLib('${it.id}')" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px">×</button></td>
    </tr>`).join('')}
    </tbody></table></div>`}`;
}
window.openAddLibrary=function(){['lib-org','lib-cat','lib-service','lib-elig','lib-web','lib-phone','lib-notes'].forEach(id=>document.getElementById(id).value='');openModal('modal-library');};
window.saveLibraryItem=async function(){const org=document.getElementById('lib-org').value.trim();if(!org){alert('Enter an organization.');return;}S.library.push({id:uid(),org,category:document.getElementById('lib-cat').value.trim(),service:document.getElementById('lib-service').value.trim(),eligibility:document.getElementById('lib-elig').value.trim(),web:document.getElementById('lib-web').value.trim(),phone:document.getElementById('lib-phone').value.trim(),notes:document.getElementById('lib-notes').value.trim()});await fbSave('meta','library',{items:S.library});closeModal('modal-library');renderLibrary();};
window.updLib=async function(id,f,v){const it=S.library.find(x=>x.id===id);if(it){it[f]=v;await fbSave('meta','library',{items:S.library});}};
window.delLib=async function(id){if(!confirm('Delete from library?'))return;S.library=S.library.filter(x=>x.id!==id);await fbSave('meta','library',{items:S.library});renderLibrary();};

// ===== PATIENT CRUD =====
window.openAddPatient=function(){['p-firstname','p-lastname','p-insurance','p-notes'].forEach(id=>document.getElementById(id).value='');openModal('modal-patient');};
window.savePatient=async function(){const fn=document.getElementById('p-firstname').value.trim(),ln=document.getElementById('p-lastname').value.trim();if(!fn||!ln){alert('Enter a name.');return;}const p={id:uid(),firstName:fn,lastName:ln,insurance:document.getElementById('p-insurance').value.trim(),notes:document.getElementById('p-notes').value.trim(),archived:false,bncTodo:[],bncAsk:[],resources:[],providers:[],documents:[],scratch:''};closeModal('modal-patient');await fbSave('patients',p.id,p);showView('patient',p.id);};
window.archivePatient=async function(pid){const p=pById(pid);p.archived=!p.archived;await fbSave('patients',pid,p);renderPatient(pid);renderSidebar();};
window.deletePatient=async function(pid){if(!confirm('Permanently delete this patient and all their entries? Consider archiving instead.'))return;const eids=S.entries.filter(e=>e.patientId===pid).map(e=>e.id);await fbDel('patients',pid);await Promise.all(eids.map(id=>fbDel('entries',id)));showView('dashboard');};

// ===== MODAL UTILS =====
window.openModal=function(id){document.getElementById(id).classList.add('open');};
window.closeModal=function(id){document.getElementById(id).classList.remove('open');};
document.querySelectorAll('.modal-overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');}));

showView('dashboard');
</script>
