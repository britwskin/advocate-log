<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advocate Log Pro v2 - Part 2</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f5f7fb}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:#fff;border-right:1px solid #ddd;padding:20px;overflow:auto}
.main{margin-left:240px;padding:30px}
.card{background:#fff;border:1px solid #ddd;border-radius:10px;padding:16px;margin-bottom:20px}
.patient{display:flex;justify-content:space-between;padding:10px;border-radius:8px;cursor:pointer}
.patient:hover{background:#eef4ff}
.dot{width:10px;height:10px;border-radius:50%;background:#d33;margin-top:6px}
button{padding:10px 16px;border:none;background:#2563eb;color:#fff;border-radius:8px;cursor:pointer}
textarea{width:100%;min-height:180px}
</style>
</head>
<body>
<div class="sidebar">
<h2>Advocate Log</h2>
<h4>Patients</h4>
<div class="patient"><span>John Smith</span><span class="dot"></span></div>
<div class="patient"><span>Mary Jones</span></div>
<hr>
<button>Add Patient</button>
</div>

<div class="main">

<div class="card">
<h2>Needs Logged in Solace</h2>
<b>John Smith</b>
<ul>
<li>☐ Telephone Visit</li>
<li>☐ Research Session</li>
</ul>
</div>

<div class="card">
<h2>Quick Phrases</h2>
<ul>
<li>Initial Intake</li>
<li>Provider Outreach</li>
<li>Research Completed</li>
<li>Monthly Report</li>
</ul>
</div>

<div class="card">
<h2>Paste Anything</h2>
<select>
<option>Select Patient...</option>
<option>John Smith</option>
<option>Mary Jones</option>
</select>
<br><br>
<textarea placeholder="Paste transcript, research, email, notes..."></textarea>
<br><br>
<button>✨ Process</button>
</div>

</div>
</body>
</html>
